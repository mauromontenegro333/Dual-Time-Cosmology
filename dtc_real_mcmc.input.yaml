theory:
  classy:
    extra_args:
      output: tCl,pCl,lCl,mPk
      lensing: true
      l_max_scalars: 2500
      P_k_max_h/Mpc: 5.0
      z_pk: 0,0.5,1,2
      has_dtc_clock: 1
      dtc_Omega_m: 0.315
      dtc_Omega_r: 9.2e-05
      dtc_M_chi_over_H0: 1000.0
      dtc_Z_chi: 1.0
      dtc_C_X: 0.0
likelihood:
  chi2_one:
    external: 'lambda h, omega_b, omega_cdm, A_s, n_s, tau_reio, dtc_n0, dtc_zt, dtc_beta,
      dtc_n_shelf, dtc_z_on, dtc_z_off: 0'
params:
  h:
    prior:
      min: 0.55
      max: 0.85
    ref: 0.674
    proposal: 0.005
  omega_b:
    prior:
      min: 0.02
      max: 0.0245
    ref: 0.02237
    proposal: 0.0002
  omega_cdm:
    prior:
      min: 0.09
      max: 0.15
    ref: 0.12
    proposal: 0.001
  A_s:
    prior:
      min: 1.5e-09
      max: 2.8e-09
    ref: 2.1e-09
    proposal: 5.0e-11
  n_s:
    prior:
      min: 0.9
      max: 1.05
    ref: 0.965
    proposal: 0.005
  tau_reio:
    prior:
      min: 0.03
      max: 0.09
    ref: 0.054
    proposal: 0.005
  dtc_n0:
    prior:
      min: 0.4
      max: 1.2
    ref: 0.7194
    proposal: 0.02
  dtc_zt:
    prior:
      min: 0.5
      max: 3.0
    ref: 1.5454
    proposal: 0.05
  dtc_beta:
    prior:
      min: 3.0
      max: 10.0
    ref: 6.8739
    proposal: 0.1
  dtc_n_shelf:
    prior:
      min: 0.0
      max: 0.8
    ref: 0.3793
    proposal: 0.02
  dtc_z_on:
    prior:
      min: 0.5
      max: 5.0
    ref: 2.35
    proposal: 0.05
  dtc_z_off:
    prior:
      min: 5.0
      max: 20.0
    ref: 11.003
    proposal: 0.2
  dtc_alpha: 8.0
  dtc_gamma: 8.0
sampler:
  mcmc:
    max_samples: 2000
    Rminus1_stop: 0.05
    Rminus1_cl_stop: 0.2
output: dtc_real_mcmc
