output: chains/dtc_desi_dr2_bao_real
force: true

# Real compact BAO likelihood. This does not use Cobaya's `theory: classy`
# provider; the external likelihood calls the patched `classy` module directly.
# Run from the root of dtc_class_cobaya_bridge_v0_4b_radiation_ic_fix so that
# Python can import dtc_likelihoods.desi_dr2_compact_bao.
likelihood:
  dtc_desi_dr2_bao:
    external: >
      lambda h, omega_b, omega_cdm, A_s, n_s, tau_reio, dtc_n0, dtc_zt, dtc_beta, dtc_n_shelf, dtc_z_on, dtc_z_off: __import__('dtc_likelihoods.desi_dr2_compact_bao', fromlist=['loglike']).loglike(h, omega_b, omega_cdm, A_s, n_s, tau_reio, dtc_n0, dtc_zt, dtc_beta, dtc_n_shelf, dtc_z_on, dtc_z_off)

params:
  h:
    prior: {min: 0.55, max: 0.85}
    ref: 0.674
    proposal: 0.004

  omega_b:
    prior: {min: 0.020, max: 0.0245}
    ref: 0.02237
    proposal: 0.00015

  omega_cdm:
    prior: {min: 0.09, max: 0.15}
    ref: 0.1200
    proposal: 0.001

  # Fixed for BAO-only because these do not affect background BAO distances.
  A_s: 2.1e-9
  n_s: 0.965
  tau_reio: 0.054

  dtc_n0:
    prior: {min: 0.4, max: 1.2}
    ref: 0.7194
    proposal: 0.015

  dtc_zt:
    prior: {min: 0.5, max: 3.0}
    ref: 1.5454
    proposal: 0.04

  dtc_beta:
    prior: {min: 3.0, max: 10.0}
    ref: 6.8739
    proposal: 0.08

  dtc_n_shelf:
    prior: {min: 0.0, max: 0.8}
    ref: 0.3793
    proposal: 0.015

  dtc_z_on:
    prior: {min: 0.5, max: 5.0}
    ref: 2.350
    proposal: 0.04

  dtc_z_off:
    prior: {min: 5.0, max: 20.0}
    ref: 11.003
    proposal: 0.15

sampler:
  mcmc:
    max_samples: 5000
    Rminus1_stop: 0.05
    Rminus1_cl_stop: 0.2
